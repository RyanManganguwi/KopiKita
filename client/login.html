<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KopiKita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-stone-100 h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white rounded-3xl shadow-xl overflow-hidden max-w-4xl w-full grid md:grid-cols-2">
        <!-- Sisi Kiri: Gambar/Brand -->
        <div class="relative hidden md:block">
            <img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&q=80" 
                 class="w-full h-full object-cover" alt="Login Coffee">
            <div class="absolute inset-0 bg-gradient-to-t from-orange-950/90 to-transparent flex flex-col justify-end p-8 text-white">
                <h2 class="text-3xl font-bold tracking-tighter mb-2">KOPI<span class="text-orange-400">KITA</span></h2>
                <p class="text-stone-300 text-sm">Kembali dan nikmati aroma kopi autentik yang menanti Anda.</p>
            </div>
        </div>

        <!-- Sisi Kanan: Form Login -->
        <div class="p-8 sm:p-12 flex flex-col justify-center">
            <div class="mb-8">
                <h3 class="text-2xl font-bold text-stone-900 mb-2">Selamat Datang Kembali</h3>
                <p class="text-stone-500 text-sm">Silakan masuk ke akun KopiKita Anda</p>
            </div>

            <!-- Alert Error (Tersembunyi secara default) -->
            <div id="errorAlert" class="hidden mb-4 bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorMessage">Email atau password salah.</span>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-stone-600 uppercase tracking-wider mb-2">Alamat Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-stone-400">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                        <input type="email" id="email" required
                               class="w-full pl-11 pr-4 py-3 bg-stone-50 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-orange-600 focus:bg-white transition" 
                               placeholder="nama@email.com">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-semibold text-stone-600 uppercase tracking-wider">Password</label>
                        <a href="#" class="text-xs text-orange-600 hover:underline">Lupa Password?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-stone-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="password" required
                               class="w-full pl-11 pr-4 py-3 bg-stone-50 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-orange-600 focus:bg-white transition" 
                               placeholder••••••••>
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-orange-900 text-white py-3 rounded-xl font-semibold hover:bg-orange-800 transition shadow-lg shadow-orange-900/20 flex items-center justify-center gap-2">
                    <span>Masuk</span>
                    <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-stone-500">
                Belum punya akun? <a href="register.html" class="text-orange-600 font-semibold hover:underline">Daftar Sekarang</a>
            </div>
        </div>
    </div>

    <!-- JavaScript Integrasi ke Backend -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');

            // Sembunyikan error sebelumnya
            errorAlert.classList.add('hidden');

            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Gagal melakukan login');
                }

                // Jika sukses, simpan token ke localStorage
                localStorage.setItem('token', data.token);
                alert('Login Berhasil! Selamat datang, ' + data.user.name);
                
                // Redirect ke halaman utama / dashboard
                window.location.href = '../index.html'; 

            } catch (err) {
                // Tampilkan pesan error
                errorMessage.innerText = err.message;
                errorAlert.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
